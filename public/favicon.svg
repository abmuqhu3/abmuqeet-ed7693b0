<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#131824"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded dark background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- HUD corner accents -->
  <path d="M 12 8 L 8 8 L 8 12" stroke="#4fc3f7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 88 8 L 92 8 L 92 12" stroke="#4fc3f7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 12 92 L 8 92 L 8 88" stroke="#4fc3f7" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 88 92 L 92 92 L 92 88" stroke="#4fc3f7" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- stylized "M" for Muqeet with neon glow -->
  <text x="50" y="72"
        font-family="Arial Black, Helvetica, sans-serif"
        font-size="70"
        font-weight="900"
        fill="#4fc3f7"
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="-2">M</text>
</svg>
